onboarding = false
[keys]
prefix = "ctrl+t"
new_tab = "prefix+c"
new_workspace = "prefix+shift+c"
split_vertical = "prefix+|"
split_horizontal = "prefix+_"
focus_pane_left = "prefix+j"
focus_pane_down = "prefix+k"
focus_pane_up = "prefix+i"
focus_pane_right = "prefix+l"
swap_pane_left = "prefix+shift+j"
swap_pane_down = "prefix+shift+k"
swap_pane_up = "prefix+shift+i"
swap_pane_right = "prefix+shift+l"
navigate_pane_left = "j"
navigate_pane_down = "k"
navigate_pane_up = "i"
navigate_pane_right = "l"
